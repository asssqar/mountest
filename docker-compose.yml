services:
  db:
    image: postgres:16-alpine
    container_name: mountest_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mountest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mountest}
      POSTGRES_DB: ${POSTGRES_DB:-mountest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mountest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mountest} -d ${POSTGRES_DB:-mountest}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mountest_pgdata:
